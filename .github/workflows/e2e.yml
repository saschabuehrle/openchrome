name: E2E Tests

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]
  schedule:
    - cron: '0 2 * * *'  # Nightly at 2 AM UTC

jobs:
  e2e-ci:
    # Only run on push/PR (not on schedule)
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    env:
      TIME_SCALE: '0.167'
      HEAP_DELTA_LIMIT_MB: '50'
      CI: 'true'
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@latest
        with:
          chrome-version: stable

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          DEBUG: '1'

      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results-ci
          path: |
            .e2e-state.json
          retention-days: 7

  e2e-nightly:
    # Only run on schedule
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    env:
      TIME_SCALE: '1'
      HEAP_DELTA_LIMIT_MB: '50'
      CI: 'true'
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@latest
        with:
          chrome-version: stable

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run E2E tests (full duration)
        run: npm run test:e2e
        env:
          DEBUG: '1'

      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results-nightly
          path: |
            .e2e-state.json
          retention-days: 30
